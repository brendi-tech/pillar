name: Deploy to VM

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: root
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/pillar
            git pull origin main

            # Rebuild API
            cd backend
            docker build --build-arg BASE_REGISTRY=docker.io/library -f Dockerfile -t pillar-api:latest .
            docker build --build-arg BASE_REGISTRY=docker.io/library -f Dockerfile.worker -t pillar-worker:latest .

            # Restart
            cd /opt/pillar
            PG_PASS=$(grep HC_POSTGRES_PASSWORD backend/.env | cut -d= -f2)
            HC_POSTGRES_PASSWORD=$PG_PASS docker compose up -d api worker --force-recreate

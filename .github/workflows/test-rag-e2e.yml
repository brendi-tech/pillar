# E2E Tests for RAG Service
#
# Tests the KnowledgeRAGService with real embeddings and vector search.
# Uses real API keys from GitHub secrets.
#
# Triggered:
# - On PRs that touch RAG-related code
# - Manually via workflow_dispatch

name: Tests - RAG E2E

on:
  pull_request:
    paths:
      - 'backend/apps/knowledge/**'
      - 'backend/common/services/embedding_service.py'
      - 'backend/common/utils/reranker_service.py'
      - 'backend/common/utils/markdown_chunker.py'
      - '.github/workflows/test-rag-e2e.yml'
  
  # Allow manual triggering
  workflow_dispatch:

concurrency:
  group: test-rag-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  test-rag-e2e:
    name: RAG Service E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: help_center_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      # Python path
      PYTHONPATH: ${{ github.workspace }}

      # Django settings - use e2e settings for real API calls
      DJANGO_SETTINGS_MODULE: config.settings.e2e

      # Database configuration
      HC_POSTGRES_HOST: localhost
      HC_POSTGRES_PORT: 5432
      HC_POSTGRES_DB: help_center_test
      HC_POSTGRES_USER: postgres
      HC_POSTGRES_PASSWORD: postgres

      # Redis configuration
      REDIS_URL: redis://localhost:6379/0
      REDIS_HOST: localhost
      REDIS_PORT: 6379

      # Required Django secrets
      SECRET_KEY: test-secret-key-for-ci-testing-only
      DJANGO_SECRET_KEY: test-secret-key-for-ci-testing-only

      # Hatchet (dummy - not needed for RAG tests)
      HATCHET_CLIENT_TOKEN: test-hatchet-token
      HATCHET_NAMESPACE: test-namespace

      # Real API keys from secrets
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}

      # Optional services
      FIRECRAWL_API_KEY: test-firecrawl-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          cd backend
          uv sync

      - name: Create test database schema
        run: |
          cd backend
          uv run python manage.py migrate --noinput --verbosity 0

      - name: Verify API keys are set
        run: |
          if [ -z "$GOOGLE_API_KEY" ] || [ "$GOOGLE_API_KEY" = "" ]; then
            echo "GOOGLE_API_KEY not set - check GitHub secrets"
            exit 1
          fi
          echo "Required API keys are set"

      - name: Run RAG E2E tests
        run: |
          cd backend
          uv run pytest tests/test_services/test_knowledge_rag_e2e.py \
            -m e2e \
            -v \
            --tb=short \
            2>&1 | tee test_output.log
          
          # Capture exit code
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          exit $TEST_EXIT_CODE

      - name: Test Summary
        if: always()
        run: |
          echo "## RAG E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Python: 3.12" >> $GITHUB_STEP_SUMMARY
          echo "- PostgreSQL: pgvector/pgvector:pg16" >> $GITHUB_STEP_SUMMARY
          echo "- Embedding Model: Gemini" >> $GITHUB_STEP_SUMMARY
          echo "- Reranking: Cohere (if COHERE_API_KEY set)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "All RAG E2E tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "Tests failed. Check logs for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-e2e-test-logs-${{ github.run_number }}
          path: backend/test_output.log
          retention-days: 7

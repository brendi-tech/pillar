# ============================================================================
# Slack App Manifest — Local Development (ngrok)
# ============================================================================
#
# How to use:
#   1. Start ngrok:  ngrok http 8003
#   2. Replace YOUR_NGROK_URL below with your ngrok URL
#      (e.g., abc123.ngrok-free.app)
#   3. Create a new Slack app from this manifest
#   4. Copy Client ID, Client Secret, Signing Secret to your .env
#   5. Set SLACK_CLIENT_ID, SLACK_CLIENT_SECRET, SLACK_SIGNING_SECRET
#

display_information:
  name: Pillar (Dev)
  description: "[DEV] AI product assistant — local development instance"
  background_color: "#2d1b69"

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Pillar (Dev)
    always_online: true
  slash_commands:
    - command: /pillar
      url: https://YOUR_NGROK_URL/api/integrations/slack/commands/
      description: Pillar commands — connect, status, help
      usage_hint: "[connect | status | help]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - commands
      - im:history
      - im:read
      - im:write
      - reactions:read
      - reactions:write
      - users:read
      - users:read.email

settings:
  event_subscriptions:
    request_url: https://YOUR_NGROK_URL/api/integrations/slack/events/
    bot_events:
      - app_mention
      - message.im
      - app_uninstalled
  interactivity:
    is_enabled: true
    request_url: https://YOUR_NGROK_URL/api/integrations/slack/interactions/
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
